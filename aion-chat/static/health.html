<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健康</title>
<link rel="stylesheet" href="/static/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff6f7d">
<style>
:root {
  --health: #ff6f7d;
  --health2: #41a67a;
  --health3: #4f7dd9;
}
.top-bar { background: rgba(255,246,247,.9); }
.page-content { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px; }
.section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--text); }
.muted { color: var(--text3); font-size: 12px; }
.ring-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.action-btn { border: 0; border-radius: 8px; padding: 9px 8px; background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; }
.action-btn.primary { background: var(--health); color: #fff; font-weight: 700; }
.action-btn.warn { background: #fff1f0; color: #c2413d; }
.action-btn:disabled { opacity: .55; cursor: default; }
.candidate-panel { display: none; margin-top: 10px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.candidate-panel.show { display: block; }
.candidate-head { display: flex; justify-content: space-between; gap: 8px; padding: 8px 10px; background: var(--surface2); color: var(--text2); font-size: 12px; }
.candidate-list { display: grid; gap: 0; }
.candidate-btn { display: flex; justify-content: space-between; align-items: center; gap: 8px; width: 100%; border: 0; border-top: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 9px 10px; text-align: left; cursor: pointer; font-size: 13px; }
.candidate-btn strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.candidate-btn span { flex-shrink: 0; color: var(--text3); font-size: 11px; }
.candidate-btn.likely strong { color: var(--health); }
.status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; color: var(--text2); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.status-dot.on { background: var(--health2); box-shadow: 0 0 0 4px rgba(65,166,122,.12); }
.vital-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.vital-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; min-height: 72px; }
.vital-label { color: var(--text2); font-size: 12px; margin-bottom: 6px; }
.vital-value { color: var(--text); font-size: 24px; line-height: 1.1; font-weight: 800; overflow-wrap: anywhere; }
.vital-unit { color: var(--text3); font-size: 11px; margin-left: 2px; }
.sleep-box { margin-top: 8px; background: #f6f8ff; border: 1px solid #e3e8fb; border-radius: 8px; padding: 10px; }
.sleep-main { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
.sleep-total { font-size: 22px; font-weight: 800; color: var(--health3); }
.sleep-meta { margin-top: 7px; color: var(--text2); font-size: 12px; line-height: 1.6; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-grid.full { grid-template-columns: 1fr; }
.inline-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }
.input-wrap label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.input-wrap input, .input-wrap select, .input-wrap textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 8px; background: var(--bg);
  color: var(--text); padding: 9px 10px; font-size: 14px; font-family: inherit; outline: none;
}
.input-wrap textarea { min-height: 62px; resize: vertical; }
.save-btn { border: 0; border-radius: 8px; background: var(--health); color: #fff; padding: 10px 14px; font-weight: 700; cursor: pointer; }
.calendar-toggle { border: 1px solid var(--border); background: var(--surface2); color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 13px; cursor: pointer; }
.calendar-panel { display: none; }
.calendar-panel.show { display: block; }
.calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.calendar-nav button { border: 0; background: var(--surface2); color: var(--text); border-radius: 7px; padding: 6px 10px; cursor: pointer; }
.calendar-title { font-size: 14px; font-weight: 700; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
.weekday { text-align: center; color: var(--text3); font-size: 11px; padding: 3px 0; }
.day-cell { min-height: 52px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); padding: 5px; font-size: 11px; overflow: hidden; }
.day-cell.out { opacity: .35; }
.day-num { color: var(--text2); font-size: 11px; }
.day-weight { margin-top: 4px; color: var(--health2); font-weight: 700; white-space: nowrap; }
.day-period { margin-top: 3px; height: 4px; border-radius: 999px; background: var(--health); opacity: .85; }
.recent-list { display: grid; gap: 6px; margin-top: 10px; }
.recent-item { display: flex; justify-content: space-between; gap: 8px; border-top: 1px solid var(--border); padding-top: 7px; color: var(--text2); font-size: 13px; }
.period-list { display: grid; gap: 7px; margin-top: 10px; }
.period-item { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; border-top: 1px solid var(--border); padding-top: 8px; font-size: 13px; color: var(--text2); }
.period-item button { border: 0; background: transparent; color: var(--danger); cursor: pointer; padding: 4px; }
.log-box { max-height: 110px; overflow: auto; background: #2d2530; color: #f6eef8; border-radius: 8px; padding: 8px; font-family: Consolas, monospace; font-size: 11px; line-height: 1.5; }
@media (max-width: 460px) {
  .ring-actions, .inline-form { grid-template-columns: 1fr; }
  .vital-value { font-size: 21px; }
  .day-cell { min-height: 48px; padding: 4px; }
}
</style>
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">⬅</button>
    <h2>健康</h2>
  </div>
  <div class="page-content">
    <section class="section" style="display:flex;align-items:center;justify-content:space-between;padding:11px 13px;">
      <div>
        <div class="section-title" style="margin-bottom:2px;">分享健康数据给AI</div>
        <div class="muted">开启后每次聊天会附带身体数据摘要</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="healthShareToggle" onchange="toggleHealthShare(this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </section>
    <section class="section">
      <div class="section-head">
        <div>
          <div class="section-title">智能戒指</div>
          <div class="muted" id="ringSub">未同步</div>
        </div>
        <span class="muted" id="batteryInfo"></span>
      </div>
      <div class="status-row">
        <span class="status-dot" id="ringDot"></span>
        <span id="ringStatus">未连接</span>
      </div>
      <div class="ring-actions">
        <button class="action-btn" id="btnConnect" onclick="ringToggleConnect()">连接</button>
        <button class="action-btn" onclick="resetSavedRingDevice()">重选戒指</button>
        <button class="action-btn primary" id="btnSync" onclick="syncRingHistory()">同步新数据</button>
        <button class="action-btn warn" id="btnClearRing" onclick="clearRingCache()">清除戒指缓存</button>
      </div>
      <div class="candidate-panel" id="candidatePanel">
        <div class="candidate-head">
          <span>戒指候选设备</span>
        <span>弹窗关闭时可在这里点选</span>
        </div>
        <div class="candidate-list" id="candidateList"></div>
      </div>
      <div class="vital-grid" style="margin-top:10px">
        <div class="vital-card"><div class="vital-label">心率</div><span class="vital-value" id="hrValue">--</span><span class="vital-unit">bpm</span></div>
        <div class="vital-card"><div class="vital-label">血压</div><span class="vital-value" id="bpValue">--/--</span><span class="vital-unit">mmHg</span></div>
        <div class="vital-card"><div class="vital-label">血氧</div><span class="vital-value" id="spo2Value">--</span><span class="vital-unit">%</span></div>
        <div class="vital-card"><div class="vital-label">HRV</div><span class="vital-value" id="hrvValue">--</span><span class="vital-unit">ms</span></div>
      </div>
      <div class="sleep-box">
        <div class="sleep-main">
          <div>
            <div class="vital-label">最近睡眠</div>
            <div class="sleep-total" id="sleepTotal">--</div>
          </div>
          <div class="muted" id="sleepRange">暂无数据</div>
        </div>
        <div class="sleep-meta" id="sleepMeta">深睡 -- · 浅睡 -- · REM -- · 清醒 --</div>
      </div>
      <div class="log-box" id="ringLog" style="margin-top:10px"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">体重记录</div>
        <button class="calendar-toggle" onclick="toggleCalendar()">展开日历</button>
      </div>
      <div class="inline-form">
        <div class="input-wrap">
          <label>日期</label>
          <input type="date" id="weightDate">
        </div>
        <div class="input-wrap">
          <label>体重 kg</label>
          <input type="number" id="weightValue" step="0.1" min="1" placeholder="例如 58.6">
        </div>
        <button class="save-btn" onclick="saveWeight()">保存</button>
      </div>
      <div class="input-wrap" style="margin-top:8px">
        <label>备注</label>
        <input id="weightNote" maxlength="80" placeholder="可记录饮食、运动、水肿等">
      </div>
      <div class="calendar-panel" id="calendarPanel">
        <div class="calendar-nav">
          <button onclick="shiftMonth(-1)">‹</button>
          <div class="calendar-title" id="calendarTitle"></div>
          <button onclick="shiftMonth(1)">›</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="recent-list" id="recentWeights"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">姨妈期</div>
        <span class="muted">按日期范围记录</span>
      </div>
      <div class="form-grid">
        <div class="input-wrap">
          <label>开始日期</label>
          <input type="date" id="periodStart">
        </div>
        <div class="input-wrap">
          <label>结束日期</label>
          <input type="date" id="periodEnd">
        </div>
      </div>
      <div class="form-grid" style="margin-top:8px">
        <div class="input-wrap">
          <label>量</label>
          <select id="periodFlow">
            <option value="">不填</option>
            <option value="少">少</option>
            <option value="中">中</option>
            <option value="多">多</option>
          </select>
        </div>
        <div class="input-wrap">
          <label>症状</label>
          <input id="periodSymptoms" maxlength="80" placeholder="痛经、嗜睡、情绪等">
        </div>
      </div>
      <div class="input-wrap" style="margin-top:8px">
        <label>备注</label>
        <input id="periodNote" maxlength="120" placeholder="可不填">
      </div>
      <button class="save-btn" style="width:100%; margin-top:10px" onclick="savePeriod()">保存姨妈期</button>
      <div class="period-list" id="periodList"></div>
    </section>
  </div>
</div>
<script src="/static/common.js"></script>
<script>
const DT_HEALTH_HEART = 0x0506;
const DT_HEALTH_BLOOD = 0x0508;
const DT_HEALTH_SPO2 = 0x051A;
const DT_HEALTH_BODY = 0x0533;
const DT_HEALTH_ALL = 0x0509;
const DT_HEALTH_SLEEP = 0x0504;
const DT_HEALTH_BLOCK = 0x0580;
const DT_SETTING_TIME = 0x0100;
const DT_GET_DEVICE_INFO = 0x0201;
const DT_GET_CHIP_SCHEME = 0x021B;
const DT_GET_POWER = 0x0225;
const RT_BATTERY = 0x0615;
const DT_DELETE_SLEEP = 0x0541;
const DT_DELETE_HEART = 0x0542;
const DT_DELETE_BLOOD = 0x0543;
const DT_DELETE_ALL = 0x0544;
const DT_DELETE_SPO2 = 0x0545;

const BLE_SERVICES = [
  { service: 'be940000-7333-be46-b7ae-689e71722bd5', write: 'be940001-7333-be46-b7ae-689e71722bd5', name: 'Main' },
  { service: '6e400001-b5a3-f393-e0a9-e50e24dcca9e', write: '6e400002-b5a3-f393-e0a9-e50e24dcca9e', name: 'UART' },
  { service: '0000ae00-0000-1000-8000-00805f9b34fb', write: '0000ae01-0000-1000-8000-00805f9b34fb', name: 'JieLi' }
];
const ALL_SERVICE_UUIDS = BLE_SERVICES.map(s => s.service);
const HEALTH_ACK_MAP = { 0x0513: DT_HEALTH_SLEEP, 0x0515: DT_HEALTH_HEART, 0x0517: DT_HEALTH_BLOOD, 0x0518: DT_HEALTH_ALL, 0x0522: DT_HEALTH_SPO2, 0x0534: DT_HEALTH_BODY };
const HEALTH_REQUEST_CMDS = new Set([DT_HEALTH_SLEEP, DT_HEALTH_HEART, DT_HEALTH_BLOOD, DT_HEALTH_ALL, DT_HEALTH_SPO2, DT_HEALTH_BODY]);
const HEALTH_ACCUMULATE_TIMEOUT_MS = 5000;

let bleDevice = null, bleServer = null, writeChar = null, isConnected = false, deviceReady = false;
let nativeConnected = false, nativeMode = false;
let reassemblyData = null, reassemblyFlag = false;
let healthAccumulator = {};
let pendingResponses = {};
let historyData = {};
let healthState = { weights: [], periods: [], ring: null };
let calendarDate = new Date();
let ringCandidates = [];
let syncing = false;
let autoSyncKey = '';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function logRing(msg) {
  const el = $('ringLog');
  const line = document.createElement('div');
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(line);
  while (el.children.length > 80) el.removeChild(el.lastChild);
}
function setRingConnected(on, name = '') {
  isConnected = !!on;
  $('ringDot').classList.toggle('on', isConnected);
  $('ringStatus').textContent = isConnected ? `已连接${name ? ': ' + name : ''}` : '未连接';
  $('btnConnect').textContent = isConnected ? '断开' : '连接';
}
function setBusy(id, busy, text) {
  const btn = $(id);
  if (!btn) return;
  btn.disabled = busy;
  if (text) btn.textContent = text;
}

window.ringNativeBle = {
  onConnected(name) {
    nativeConnected = true;
    nativeMode = true;
    setRingConnected(true, name || '');
    logRing('原生蓝牙已连接');
    deviceInitHandshake();
  },
  onDisconnected() {
    nativeConnected = false;
    nativeMode = false;
    deviceReady = false;
    setRingConnected(false);
    logRing('设备已断开');
  },
  onData(hex) {
    processIncomingBytes(hexToBytes(hex));
  },
  onScanDevice(id, name, rssi, likely) {
    const exists = ringCandidates.some(d => d.id === id);
    if (!exists) {
      ringCandidates.push({ id, name: name || '未知设备', rssi, likely: !!likely });
      renderRingCandidates();
    }
  },
  onError(msg) { logRing(msg || '蓝牙错误'); },
  onLog(msg) { logRing(msg || ''); }
};

function renderRingCandidates() {
  const panel = $('candidatePanel');
  const list = $('candidateList');
  if (!ringCandidates.length) {
    panel.classList.remove('show');
    list.innerHTML = '';
    return;
  }
  panel.classList.add('show');
  const sorted = [...ringCandidates].filter(d => d.likely || /smart\s*ring|ring|ycbt/i.test(d.name)).sort((a, b) => Number(b.likely) - Number(a.likely) || b.rssi - a.rssi);
  if (!sorted.length) {
    panel.classList.remove('show');
    list.innerHTML = '';
    return;
  }
  list.innerHTML = sorted.map(d => `<button class="candidate-btn ${d.likely ? 'likely' : ''}" onclick="connectRingCandidate(${d.id})">
    <strong>${escHtml(d.name)}${d.likely ? ' · 可能是戒指' : ''}</strong>
    <span>${d.rssi} dBm</span>
  </button>`).join('');
}

function connectRingCandidate(id) {
  if (!window.AionRingBle || typeof window.AionRingBle.connectCandidate !== 'function') {
    showToast('当前 APK 不支持手动选择设备');
    return;
  }
  logRing('手动选择候选设备 #' + id);
  window.AionRingBle.connectCandidate(id);
}

function resetSavedRingDevice() {
  if (!window.AionRingBle || typeof window.AionRingBle.forgetSavedDevice !== 'function') {
    showToast('当前 APK 不支持重选戒指');
    return;
  }
  ringDisconnect();
  ringCandidates = [];
  renderRingCandidates();
  window.AionRingBle.forgetSavedDevice();
  setTimeout(() => {
    logRing('重新扫描戒指候选，请点选你的戒指');
    window.AionRingBle.connect();
  }, 250);
}

async function ringToggleConnect() {
  if (isConnected) {
    ringDisconnect();
    return;
  }
  if (window.AionRingBle) {
    nativeMode = true;
    ringCandidates = [];
    renderRingCandidates();
    logRing('正在调用手机原生蓝牙...');
    try {
      if (typeof window.AionRingBle.getStatus === 'function') {
        logRing('调用前状态: ' + window.AionRingBle.getStatus());
      }
      if (typeof window.AionRingBle.hasSavedDevice === 'function'
          && typeof window.AionRingBle.autoConnect === 'function'
          && window.AionRingBle.hasSavedDevice()) {
        logRing('已保存戒指，尝试自动连接');
        window.AionRingBle.autoConnect();
      } else {
        logRing('首次连接会弹出戒指选择框，请点选你的戒指');
        window.AionRingBle.connect();
      }
      setTimeout(() => {
        if (!isConnected && window.AionRingBle && typeof window.AionRingBle.getStatus === 'function') {
          logRing('调用后状态: ' + window.AionRingBle.getStatus());
        }
      }, 1500);
      setTimeout(() => {
        if (!isConnected && window.AionRingBle && typeof window.AionRingBle.getStatus === 'function') {
          logRing('服务检查状态: ' + window.AionRingBle.getStatus());
        }
      }, 4500);
    } catch (e) {
      logRing('原生蓝牙调用失败: ' + (e.message || e));
      showToast('原生蓝牙调用失败');
    }
  } else if (navigator.userAgent.includes('AionChatApp')) {
    showToast('当前 APK 还没有戒指蓝牙桥，请重新打包安装');
    logRing('当前 APK 未检测到 AionRingBle，需要重新打包安装新版 APK');
  } else {
    await webBleConnect();
  }
}

async function webBleConnect() {
  if (!navigator.bluetooth) {
    showToast('当前浏览器不支持 Web Bluetooth');
    return;
  }
  try {
    logRing('正在搜索戒指...');
    const filters = [0x7810, 0x7811, 0x7812, 0x7813, 0xFEC5].map(id => ({ manufacturerData: [{ companyIdentifier: id }] }));
    filters.push({ namePrefix: 'DFU' }, { namePrefix: 'dfu' });
    bleDevice = await navigator.bluetooth.requestDevice({ filters, optionalServices: ALL_SERVICE_UUIDS });
    bleDevice.addEventListener('gattserverdisconnected', () => {
      isConnected = false;
      deviceReady = false;
      setRingConnected(false);
      logRing('设备已断开');
    });
    bleServer = await bleDevice.gatt.connect();
    let service = null, matched = null;
    for (const svc of BLE_SERVICES) {
      try {
        service = await bleServer.getPrimaryService(svc.service);
        matched = svc;
        break;
      } catch {}
    }
    if (!service || !matched) throw new Error('未找到戒指服务');
    const chars = await service.getCharacteristics();
    for (const ch of chars) {
      if (ch.uuid === matched.write) writeChar = ch;
      if (ch.properties.notify || ch.properties.indicate) {
        await ch.startNotifications();
        ch.addEventListener('characteristicvaluechanged', e => {
          processIncomingBytes(new Uint8Array(e.target.value.buffer));
        });
      }
    }
    if (!writeChar) writeChar = await service.getCharacteristic(matched.write);
    setRingConnected(true, bleDevice.name || '');
    logRing('戒指连接成功');
    await deviceInitHandshake();
  } catch (e) {
    logRing('连接失败: ' + e.message);
    setRingConnected(false);
  }
}

function ringDisconnect() {
  if (window.AionRingBle && nativeMode) {
    window.AionRingBle.disconnect();
  } else if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
  nativeConnected = false;
  nativeMode = false;
  isConnected = false;
  deviceReady = false;
  setRingConnected(false);
}

async function deviceInitHandshake() {
  deviceReady = false;
  await sleep(350);
  const now = new Date();
  const year = now.getFullYear();
  const dow = now.getDay();
  const dowEncoded = dow === 0 ? 6 : dow - 1;
  await sendPacket(DT_SETTING_TIME, new Uint8Array([year & 0xFF, (year >> 8) & 0xFF, now.getMonth()+1, now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds(), dowEncoded]));
  await sleep(500);
  await sendPacket(DT_GET_DEVICE_INFO, new Uint8Array([0xFF, 0x46]));
  await sleep(500);
  await sendPacket(DT_GET_CHIP_SCHEME, new Uint8Array(0));
  await sleep(500);
  await sendPacket(DT_GET_POWER, new Uint8Array(0));
  await sleep(500);
  deviceReady = true;
  logRing('设备初始化完成');
}

async function syncRingHistory(auto = false) {
  if (syncing) return;
  if (!isConnected) { if (!auto) showToast('请先连接戒指'); return; }
  if (!deviceReady) { if (!auto) showToast('戒指还在初始化'); return; }
  syncing = true;
  setBusy('btnSync', true, '同步中...');
  historyData = {};
  try {
    const types = [
      [DT_HEALTH_SLEEP, '睡眠'],
      [DT_HEALTH_HEART, '心率'],
      [DT_HEALTH_BLOOD, '血压'],
      [DT_HEALTH_ALL, '综合'],
      [DT_HEALTH_SPO2, '血氧'],
      [DT_HEALTH_BODY, '身体数据']
    ];
    for (const [dt, name] of types) {
      logRing(`请求${name}历史`);
      const promise = waitForResponse(dt, 35000);
      await sendPacket(dt, new Uint8Array(0));
      await promise;
      await sleep(350);
    }
    const payload = buildSnapshotPayload();
    if (!payload) {
      showToast('没有同步到新数据');
      return;
    }
    const saved = await api('POST', '/api/health/ring/latest', payload);
    healthState.ring = saved;
    renderRing(saved);
    $('ringSub').textContent = '同步于 ' + new Date(saved.synced_at * 1000).toLocaleString();
    showToast('戒指数据已同步');
  } finally {
    syncing = false;
    setBusy('btnSync', false, '同步新数据');
  }
}

// ── 定时自动同步：每小时的 :05 和 :35 分自动同步（戒指每半小时测一次，5分钟后取数据） ──
setInterval(() => {
  if (!isConnected || !deviceReady || syncing) return;
  const now = new Date();
  const min = now.getMinutes();
  if (min !== 5 && min !== 35) return;
  const key = `${now.getHours()}_${min}`;
  if (autoSyncKey === key) return;
  autoSyncKey = key;
  logRing('⏰ 定时自动同步...');
  syncRingHistory(true);
}, 30000);

async function clearRingCache() {
  if (!isConnected) return showToast('请先连接戒指');
  if (!confirm('确定清除戒指里的已同步缓存吗？')) return;
  setBusy('btnClearRing', true, '清除中...');
  try {
    for (const cmd of [DT_DELETE_SLEEP, DT_DELETE_HEART, DT_DELETE_BLOOD, DT_DELETE_ALL, DT_DELETE_SPO2]) {
      await sendPacket(cmd, new Uint8Array([0x02]));
      await sleep(350);
    }
    logRing('已发送清除缓存命令');
    showToast('清除命令已发送');
  } finally {
    setBusy('btnClearRing', false, '清除戒指缓存');
  }
}

function waitForResponse(dataType, timeoutMs = 30000) {
  return new Promise(resolve => {
    const timer = setTimeout(() => {
      delete pendingResponses[dataType];
      resolve(null);
    }, timeoutMs);
    pendingResponses[dataType] = { resolve, timer };
  });
}

function processIncomingBytes(raw) {
  if (reassemblyFlag) {
    const combined = new Uint8Array(reassemblyData.length + raw.length);
    combined.set(reassemblyData, 0);
    combined.set(raw, reassemblyData.length);
    const declaredLen = (combined[2] & 0xFF) + ((combined[3] & 0xFF) << 8);
    if (combined.length < declaredLen) {
      reassemblyData = combined;
      return;
    }
    reassemblyFlag = false;
    reassemblyData = null;
    processCompletePacket(combined.slice(0, declaredLen));
    if (combined.length > declaredLen) processIncomingBytes(combined.slice(declaredLen));
    return;
  }
  if (raw.length < 4) return;
  const declaredLen = (raw[2] & 0xFF) + ((raw[3] & 0xFF) << 8);
  if (raw.length < declaredLen) {
    reassemblyFlag = true;
    reassemblyData = raw;
    return;
  }
  processCompletePacket(raw.slice(0, declaredLen));
  if (raw.length > declaredLen) processIncomingBytes(raw.slice(declaredLen));
}

function processCompletePacket(pkt) {
  const group = pkt[0] & 0xFF;
  const subCmd = pkt[1] & 0xFF;
  const totalLen = (pkt[2] & 0xFF) + ((pkt[3] & 0xFF) << 8);
  const payloadLen = totalLen - 6;
  const payload = payloadLen > 0 ? pkt.slice(4, 4 + payloadLen) : new Uint8Array(0);
  const dataType = (group << 8) | subCmd;
  if (group === 5) {
    accumulateHealthData(dataType, payload);
    return;
  }
  if (dataType === DT_GET_POWER || dataType === RT_BATTERY) {
    const batt = payloadLen >= 30 ? payload[29] : (payloadLen >= 2 ? payload[1] : null);
    if (batt != null) $('batteryInfo').textContent = `电量 ${batt}%`;
  }
}

function accumulateHealthData(dataType, payload) {
  if (dataType === DT_HEALTH_BLOCK) {
    Object.keys(healthAccumulator).map(Number).forEach(finalizeHealthData);
    return;
  }
  if (HEALTH_REQUEST_CMDS.has(dataType)) {
    if (payload.length >= 2) {
      const recordCount = (payload[0] & 0xFF) + ((payload[1] & 0xFF) << 8);
      if (recordCount === 0 && pendingResponses[dataType]) {
        clearTimeout(pendingResponses[dataType].timer);
        pendingResponses[dataType].resolve(new Uint8Array(0));
        delete pendingResponses[dataType];
      }
    }
    return;
  }
  const parentType = HEALTH_ACK_MAP[dataType];
  const resolveType = parentType || dataType;
  if (payload.length === 0) {
    finalizeHealthData(resolveType);
    return;
  }
  if (!healthAccumulator[resolveType]) healthAccumulator[resolveType] = { payloads: [], timer: null };
  const acc = healthAccumulator[resolveType];
  acc.payloads.push(new Uint8Array(payload));
  clearTimeout(acc.timer);
  acc.timer = setTimeout(() => finalizeHealthData(resolveType), HEALTH_ACCUMULATE_TIMEOUT_MS);
}

function finalizeHealthData(dataType) {
  const acc = healthAccumulator[dataType];
  let combined = new Uint8Array(0);
  if (acc) {
    clearTimeout(acc.timer);
    const totalLen = acc.payloads.reduce((s, p) => s + p.length, 0);
    combined = new Uint8Array(totalLen);
    let offset = 0;
    for (const p of acc.payloads) {
      combined.set(p, offset);
      offset += p.length;
    }
    delete healthAccumulator[dataType];
  }
  handleGenericHistory(dataType, combined);
  if (pendingResponses[dataType]) {
    clearTimeout(pendingResponses[dataType].timer);
    pendingResponses[dataType].resolve(combined);
    delete pendingResponses[dataType];
  }
}

function handleGenericHistory(dataType, payload) {
  const TIME_OFFSET = new Date(2000, 0, 1).getTime() / 1000;
  const records = [];
  if (dataType === DT_HEALTH_HEART) {
    for (let i = 0; i + 6 <= payload.length; i += 6) {
      const ts = readU32LE(payload, i);
      records.push({ time: new Date((ts + TIME_OFFSET) * 1000), mode: payload[i+4] & 0xFF, hr: payload[i+5] & 0xFF });
    }
  } else if (dataType === DT_HEALTH_BLOOD) {
    for (let i = 0; i + 8 <= payload.length; i += 8) {
      const ts = readU32LE(payload, i);
      records.push({ time: new Date((ts + TIME_OFFSET) * 1000), sbp: payload[i+5] & 0xFF, dbp: payload[i+6] & 0xFF, hr: payload[i+7] & 0xFF });
    }
  } else if (dataType === DT_HEALTH_SPO2) {
    for (let i = 0; i + 6 <= payload.length; i += 6) {
      const ts = readU32LE(payload, i);
      records.push({ time: new Date((ts + TIME_OFFSET) * 1000), spo2: payload[i+5] & 0xFF });
    }
  } else if (dataType === DT_HEALTH_ALL) {
    for (let i = 0; i + 20 <= payload.length; i += 20) {
      const ts = readU32LE(payload, i);
      records.push({
        time: new Date((ts + TIME_OFFSET) * 1000),
        steps: (payload[i+4]&0xFF) + ((payload[i+5]&0xFF)<<8),
        hr: payload[i+6] & 0xFF, sbp: payload[i+7] & 0xFF, dbp: payload[i+8] & 0xFF,
        spo2: payload[i+9] & 0xFF, resp: payload[i+10] & 0xFF, hrv: payload[i+11] & 0xFF
      });
    }
  } else if (dataType === DT_HEALTH_BODY) {
    for (let i = 0; i + 28 <= payload.length; i += 28) {
      const ts = readU32LE(payload, i);
      records.push({ time: new Date((ts + TIME_OFFSET) * 1000), hrv: (payload[i+6]&0xFF) + (payload[i+7]&0xFF)/100, stress: (payload[i+8]&0xFF) + (payload[i+9]&0xFF)/100 });
    }
  } else if (dataType === DT_HEALTH_SLEEP) {
    let pos = 0;
    while (pos + 20 <= payload.length) {
      const totalDataLen = (payload[pos+2]&0xFF) + ((payload[pos+3]&0xFF)<<8);
      const startTime = readU32LE(payload, pos + 4);
      const endTime = readU32LE(payload, pos + 8);
      const deepSleepCount = (payload[pos+12]&0xFF) + ((payload[pos+13]&0xFF)<<8);
      let remTotal = 0, deepTotal, lightTotal;
      if (deepSleepCount === 0xFFFF) {
        remTotal = (payload[pos+14]&0xFF) + ((payload[pos+15]&0xFF)<<8);
        deepTotal = (payload[pos+16]&0xFF) + ((payload[pos+17]&0xFF)<<8);
        lightTotal = (payload[pos+18]&0xFF) + ((payload[pos+19]&0xFF)<<8);
      } else {
        deepTotal = ((payload[pos+16]&0xFF) + ((payload[pos+17]&0xFF)<<8)) * 60;
        lightTotal = ((payload[pos+18]&0xFF) + ((payload[pos+19]&0xFF)<<8)) * 60;
      }
      let wakeCount = 0, wakeDuration = 0;
      const headerEnd = pos + 20;
      const recordEnd = (totalDataLen > 0 && pos + totalDataLen <= payload.length) ? pos + totalDataLen : headerEnd;
      for (let spos = headerEnd; spos + 8 <= recordEnd; spos += 8) {
        const sleepType = payload[spos] & 0xFF;
        const sleepLen = (payload[spos+5]&0xFF) + ((payload[spos+6]&0xFF)<<8) + ((payload[spos+7]&0xFF)<<16);
        if (sleepType === 0xF4) { wakeCount++; wakeDuration += sleepLen; }
      }
      records.push({
        time: new Date((startTime + TIME_OFFSET) * 1000),
        timeEnd: new Date((endTime + TIME_OFFSET) * 1000),
        deepMin: Math.round(deepTotal / 60),
        lightMin: Math.round(lightTotal / 60),
        remMin: Math.round(remTotal / 60),
        wakeCount,
        wakeMin: Math.round(wakeDuration / 60)
      });
      pos = (totalDataLen > 0 && pos + totalDataLen <= payload.length) ? pos + totalDataLen : headerEnd;
    }
  }
  if (records.length) {
    historyData[dataType] = records;
    logRing(`${getHealthTypeName(dataType)} ${records.length} 条`);
  }
}

function buildSnapshotPayload() {
  const latest = list => (list && list.length) ? [...list].sort((a,b) => b.time - a.time)[0] : null;
  const all = latest(historyData[DT_HEALTH_ALL]);
  const heart = latest(historyData[DT_HEALTH_HEART]);
  const blood = latest(historyData[DT_HEALTH_BLOOD]);
  const spo2 = latest(historyData[DT_HEALTH_SPO2]);
  const body = latest(historyData[DT_HEALTH_BODY]);
  const sleep = latest(historyData[DT_HEALTH_SLEEP]);
  if (!all && !heart && !blood && !spo2 && !body && !sleep) return null;
  const measuredDates = [all, heart, blood, spo2, body].filter(Boolean).map(r => r.time.getTime());
  const measuredAt = measuredDates.length ? Math.max(...measuredDates) / 1000 : Date.now() / 1000;
  return {
    device_name: (bleDevice && bleDevice.name) || '',
    heart_rate: (all && all.hr) || (heart && heart.hr) || (blood && blood.hr) || null,
    systolic_bp: (all && all.sbp) || (blood && blood.sbp) || null,
    diastolic_bp: (all && all.dbp) || (blood && blood.dbp) || null,
    spo2: (all && all.spo2) || (spo2 && spo2.spo2) || null,
    hrv: (body && body.hrv) || (all && all.hrv) || null,
    measured_at: measuredAt,
    sleep: sleep ? {
      start_at: sleep.time.getTime() / 1000,
      end_at: sleep.timeEnd.getTime() / 1000,
      total_min: (sleep.deepMin || 0) + (sleep.lightMin || 0) + (sleep.remMin || 0),
      deep_min: sleep.deepMin, light_min: sleep.lightMin, rem_min: sleep.remMin,
      wake_min: sleep.wakeMin, wake_count: sleep.wakeCount
    } : null,
    raw: { all, heart, blood, spo2, body, sleep }
  };
}

function renderRing(ring) {
  if (!ring) return;
  $('hrValue').textContent = ring.heart_rate || '--';
  $('bpValue').textContent = ring.systolic_bp && ring.diastolic_bp ? `${ring.systolic_bp}/${ring.diastolic_bp}` : '--/--';
  $('spo2Value').textContent = ring.spo2 || '--';
  $('hrvValue').textContent = ring.hrv ? Number(ring.hrv).toFixed(ring.hrv % 1 ? 1 : 0) : '--';
  if (ring.synced_at) $('ringSub').textContent = '同步于 ' + new Date(ring.synced_at * 1000).toLocaleString();
  if (ring.sleep_start_at && ring.sleep_end_at) {
    $('sleepTotal').textContent = fmtMin(ring.sleep_total_min);
    $('sleepRange').textContent = `${fmtTime(ring.sleep_start_at)} - ${fmtTime(ring.sleep_end_at)}`;
    $('sleepMeta').textContent = `深睡 ${ring.sleep_deep_min || 0}m · 浅睡 ${ring.sleep_light_min || 0}m · REM ${ring.sleep_rem_min || 0}m · 清醒 ${ring.sleep_wake_count || 0}次/${ring.sleep_wake_min || 0}m`;
  }
}

async function loadHealth() {
  const data = await api('GET', '/api/health/summary');
  healthState = { ring: data.ring, weights: data.weights || [], periods: data.periods || [] };
  renderRing(healthState.ring);
  renderCalendar();
  renderRecentWeights();
  renderPeriods();
}

async function saveWeight() {
  const date = $('weightDate').value;
  const weight = parseFloat($('weightValue').value);
  if (!date || !weight) return showToast('请填写日期和体重');
  const item = await api('POST', '/api/health/weights', { date, weight_kg: weight, note: $('weightNote').value.trim() });
  if (item.error) return showToast(item.error);
  healthState.weights = healthState.weights.filter(w => w.date !== item.date);
  healthState.weights.unshift(item);
  $('weightNote').value = '';
  renderCalendar();
  renderRecentWeights();
  showToast('体重已保存');
}

function toggleCalendar() {
  const panel = $('calendarPanel');
  panel.classList.toggle('show');
  document.querySelector('.calendar-toggle').textContent = panel.classList.contains('show') ? '收起日历' : '展开日历';
}

function shiftMonth(delta) {
  calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + delta, 1);
  renderCalendar();
}

function renderCalendar() {
  const grid = $('calendarGrid');
  const y = calendarDate.getFullYear();
  const m = calendarDate.getMonth();
  $('calendarTitle').textContent = `${y}年${m + 1}月`;
  const weightMap = new Map(healthState.weights.map(w => [w.date, w]));
  const weekdays = ['一','二','三','四','五','六','日'];
  let html = weekdays.map(d => `<div class="weekday">${d}</div>`).join('');
  const first = new Date(y, m, 1);
  const offset = (first.getDay() + 6) % 7;
  const start = new Date(y, m, 1 - offset);
  for (let i = 0; i < 42; i++) {
    const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const ds = dateToStr(d);
    const w = weightMap.get(ds);
    const out = d.getMonth() !== m;
    const period = isPeriodDate(ds);
    html += `<div class="day-cell ${out ? 'out' : ''}">
      <div class="day-num">${d.getDate()}</div>
      ${w ? `<div class="day-weight">${Number(w.weight_kg).toFixed(1)}kg</div>` : ''}
      ${period ? '<div class="day-period"></div>' : ''}
    </div>`;
  }
  grid.innerHTML = html;
}

function renderRecentWeights() {
  const items = [...healthState.weights].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 8);
  $('recentWeights').innerHTML = items.map(w => `<div class="recent-item"><span>${w.date}${w.note ? ' · ' + escHtml(w.note) : ''}</span><strong>${Number(w.weight_kg).toFixed(1)}kg</strong></div>`).join('') || '<div class="muted" style="margin-top:10px">暂无体重记录</div>';
}

async function savePeriod() {
  const body = {
    start_date: $('periodStart').value,
    end_date: $('periodEnd').value,
    flow: $('periodFlow').value,
    symptoms: $('periodSymptoms').value.trim(),
    note: $('periodNote').value.trim()
  };
  if (!body.start_date) return showToast('请选择开始日期');
  const item = await api('POST', '/api/health/periods', body);
  if (item.error) return showToast(item.error);
  healthState.periods.unshift(item);
  ['periodStart','periodEnd','periodSymptoms','periodNote'].forEach(id => $(id).value = '');
  $('periodFlow').value = '';
  renderPeriods();
  renderCalendar();
  showToast('姨妈期已保存');
}

async function deletePeriod(id) {
  await api('DELETE', `/api/health/periods/${id}`);
  healthState.periods = healthState.periods.filter(p => p.id !== id);
  renderPeriods();
  renderCalendar();
}

function renderPeriods() {
  $('periodList').innerHTML = healthState.periods.slice(0, 8).map(p => {
    const range = p.end_date ? `${p.start_date} - ${p.end_date}` : `${p.start_date} 开始`;
    const meta = [p.flow && `量${p.flow}`, p.symptoms, p.note].filter(Boolean).join(' · ');
    return `<div class="period-item"><div><strong>${range}</strong><br><span>${escHtml(meta || '无备注')}</span></div><button onclick="deletePeriod('${p.id}')">删除</button></div>`;
  }).join('') || '<div class="muted">暂无姨妈期记录</div>';
}

function isPeriodDate(ds) {
  return healthState.periods.some(p => ds >= p.start_date && ds <= (p.end_date || p.start_date));
}

async function sendPacket(dataType, payload) {
  const pkt = buildPacket(dataType, payload || new Uint8Array(0));
  if (window.AionRingBle && nativeMode) {
    window.AionRingBle.write(bytesToHex(pkt));
    return true;
  }
  if (!writeChar) return false;
  if (writeChar.properties.write) await writeChar.writeValueWithResponse(pkt);
  else await writeChar.writeValueWithoutResponse(pkt);
  return true;
}

function buildPacket(dataType, payload) {
  const totalLen = (payload ? payload.length : 0) + 6;
  const pkt = new Uint8Array(totalLen);
  pkt[0] = (dataType >> 8) & 0xFF;
  pkt[1] = dataType & 0xFF;
  pkt[2] = totalLen & 0xFF;
  pkt[3] = (totalLen >> 8) & 0xFF;
  if (payload && payload.length) pkt.set(payload, 4);
  const crcVal = crc16(pkt, totalLen - 2);
  pkt[totalLen - 2] = crcVal & 0xFF;
  pkt[totalLen - 1] = (crcVal >> 8) & 0xFF;
  return pkt;
}

function crc16(data, len) {
  let crc = 0xFFFF;
  for (let i = 0; i < len; i++) {
    crc = ((crc << 8) & 0xFF00) | ((crc >> 8) & 0xFF);
    crc ^= data[i] & 0xFF;
    crc ^= (crc & 0xFF) >> 4;
    crc ^= (crc << 12) & 0xFFFF;
    crc ^= ((crc & 0xFF) << 5) & 0xFFFF;
    crc &= 0xFFFF;
  }
  return crc;
}
function readU32LE(arr, offset) {
  return ((arr[offset] & 0xFF) + ((arr[offset + 1] & 0xFF) << 8) + ((arr[offset + 2] & 0xFF) << 16) + ((arr[offset + 3] & 0xFF) << 24)) >>> 0;
}
function bytesToHex(bytes) { return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(''); }
function hexToBytes(hex) {
  const out = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) out[i / 2] = parseInt(hex.slice(i, i + 2), 16);
  return out;
}
function getHealthTypeName(dt) {
  return ({[DT_HEALTH_HEART]:'心率',[DT_HEALTH_BLOOD]:'血压',[DT_HEALTH_SPO2]:'血氧',[DT_HEALTH_BODY]:'身体数据',[DT_HEALTH_ALL]:'综合',[DT_HEALTH_SLEEP]:'睡眠'})[dt] || `0x${dt.toString(16)}`;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function dateToStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtTime(ts) { const d = new Date(ts * 1000); return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtMin(min) {
  if (!min && min !== 0) return '--';
  const h = Math.floor(min / 60), m = min % 60;
  return h ? `${h}h${m ? m + 'm' : ''}` : `${m}m`;
}

async function toggleHealthShare(enabled) {
  await api('PUT', '/api/settings/health-share', { enabled });
}

(async function init() {
  $('weightDate').value = todayStr();
  $('periodStart').value = todayStr();
  // 加载健康分享开关状态
  try {
    const r = await api('GET', '/api/settings/health-share');
    $('healthShareToggle').checked = !!r.health_share_enabled;
  } catch(e) {}
  await loadHealth();
  if (navigator.userAgent.includes('AionChatApp')) {
    if (window.AionRingBle) {
      logRing('已检测到手机原生戒指蓝牙桥');
      if (typeof window.AionRingBle.hasSavedDevice === 'function'
          && typeof window.AionRingBle.autoConnect === 'function'
          && window.AionRingBle.hasSavedDevice()) {
        nativeMode = true;
        logRing('检测到已保存戒指，自动连接中...');
        setTimeout(() => window.AionRingBle.autoConnect(), 500);
      } else {
        logRing('还没有保存过戒指，首次请点“连接”后选择 Smart Ring');
      }
    } else {
      logRing('当前 APK 未包含 AionRingBle，戒指连接需要重新打包安装');
    }
  }
})();
</script>
